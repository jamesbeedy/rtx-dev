name: freeipa-server
type: charm
base: ubuntu@24.04
platforms:
  amd64: ~
summary: Primary FreeIPA identity-management server
description: |
  A Juju charm for deploying a primary FreeIPA identity-management server.
  This charm manages the installation and configuration of FreeIPA server components.
parts:
  charm:
    plugin: charm
    source: .
config:
  options:
    domain:
      type: string
      description: Domain name for the IPA server
      default: example.local
    realm:
      type: string
      description: Kerberos realm name
      default: EXAMPLE.LOCAL
    admin-password:
      type: string
      description: Admin password for IPA server
      default: ""
    setup-dns:
      type: boolean
      description: Whether to setup DNS
      default: true
    server-fqdn:
      type: string
      description: FQDN of the server
      default: ""
provides:
  freeipa:
    interface: freeipa
actions:
  get-admin-password:
    description: Retrieve the admin password
  add-host:
    description: Add a new host to the IPA server
    params:
      fqdn:
        type: string
        description: Fully qualified domain name of the host to add
        required: true
  refresh-certs:
    description: Refresh the server certificates