# Single-host docker compose stack inside the rtx5090 LXD VM.
# Core services: vllm (upstream image), vllm-agent (our code, bind-mounted),
# nginx (path-prefix reverse proxy on :8443).
# Optional: ngrok (profile: ngrok) — exposes vllm:8000 on a static public domain.
# See docs/superpowers/specs/2026-05-08-docker-compose-stack-design.md.
#
# To enable ngrok, set in .env:
#   NGROK_AUTHTOKEN=<token>
#   NGROK_DOMAIN=<your-static-domain>.ngrok-free.dev
#   COMPOSE_PROFILES=ngrok           # so `docker compose up -d` includes it
# Auth is end-to-end Bearer (VLLM_API_KEY for /v1/*, VLLM_AGENT_API_KEY for
# /agent/*) — ngrok forwards the Authorization header through.

services:
  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    gpus: all
    volumes:
      - hf-cache:/root/.cache/huggingface
    environment:
      - VLLM_API_KEY=${VLLM_API_KEY}
    command: >
      --model ${VLLM_MODEL}
      --max-model-len ${VLLM_MAX_LEN}
      --gpu-memory-utilization ${VLLM_GPU_UTIL}
      --port 8000 --host 0.0.0.0
      --quantization ${VLLM_QUANT_ARGS}
    healthcheck:
      # Use /health (no auth required) so the check works whether or not
      # VLLM_API_KEY is set.
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 60
      start_period: 1800s

  vllm-agent:
    build: ./compose/vllm-agent
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
    volumes:
      - /home/ubuntu/rtx_5090_dev/vllm-agent:/app
      - vllm-agent-sessions:/var/lib/vllm-agent/sessions
      - vllm-agent-runs:/home/agent/.cache/vllm-agent/runs
    environment:
      - VLLM_BASE_URL=http://vllm:8000
      - VLLM_MODEL=${VLLM_MODEL}
      - VLLM_API_KEY=${VLLM_API_KEY}
      - VLLM_AGENT_API_KEY=${VLLM_AGENT_API_KEY}
      - DDG_MIN_INTERVAL_S=${DDG_MIN_INTERVAL_S}
      - VLLM_AGENT_SESSION_ROOT=/var/lib/vllm-agent/sessions
    command: >
      bash -c "
      pip install --quiet --user --no-warn-script-location -e /app &&
      exec vllm-agent serve --host 0.0.0.0 --port 8088
      "

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - vllm-agent
    volumes:
      - ./compose/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8443:8443"

  # Optional public tunnel: maps a reserved ngrok domain to nginx:8443 (the
  # unified endpoint), so /v1/* (vllm) and /agent/* (vllm-agent) are both
  # reachable on one URL. Auth is end-to-end Bearer:
  #   /v1/*    requires Authorization: Bearer ${VLLM_API_KEY}
  #   /agent/* requires Authorization: Bearer ${VLLM_AGENT_API_KEY}
  # ngrok edge basic-auth is intentionally NOT used because it would
  # collide with the Bearer Authorization header.
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "--url=https://${NGROK_DOMAIN}"
      - "http://nginx:8443"

volumes:
  hf-cache:
  vllm-agent-sessions:
  vllm-agent-runs:
